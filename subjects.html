<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f6f7fb" />
<meta name="color-scheme" content="light" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Subjects</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://rosho-c2d11-default-rtdb.firebaseio.com" crossorigin />
<link rel="dns-prefetch" href="https://rosho-c2d11-default-rtdb.firebaseio.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="home-link" href="index.html" aria-label="Home">⌂</a>
      <img src="icon.svg" alt="Q&A" class="site-logo" />
      <h1 class="title" id="pageTitle">Subjects</h1>
      <a class="header-action" href="books.html">Books</a>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search subjects…" />
  </div>

  <div id="content">
    <div class="skeleton-list"><div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item short"></div></div>
  </div>
</div>

<a class="bottom-back-btn" href="index.html" aria-label="Back"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M14.8 5.2 8 12l6.8 6.8"/></svg></a>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var readData = APP.readData;
  var getChildSummaries = APP.getChildSummaries;
  var setUpdating = APP.setUpdating;

  var classId = getParam('classId');

  var $title = document.getElementById('pageTitle');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');
  var $search = document.getElementById('searchInput');
  var allSubjects = [];
  var currentClassName = '';

  if (!classId) {
    $content.innerHTML = '<div class="error-banner">No class selected.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    $title.textContent = 'Subjects';
    return;
  }

  function render(className, subjects) {
    currentClassName = className;
    allSubjects = subjects || [];
    $title.textContent = className;
    document.title = className + ' — Subjects';
    $crumbCurrent.textContent = className;
    renderFiltered();
  }

  function renderFiltered() {
    var filter = ($search.value || '').trim().toLowerCase();
    var subjects = filter ? allSubjects.filter(function (s) {
      return String(s.name || s.id).toLowerCase().includes(filter);
    }) : allSubjects;

    if (!allSubjects.length) {
      $content.innerHTML = '<div class="empty">No subjects available.</div>';
      return;
    }
    if (!subjects.length) {
      $content.innerHTML = '<div class="empty">No subjects match your search.</div>';
      return;
    }

    $content.innerHTML = '<div class="page-meta">' + allSubjects.length + ' subject' + (allSubjects.length === 1 ? '' : 's') + '</div>' +
      '<div class="list">' + subjects.map(function (sub) {
        var cc = Number(sub.chapterCount || 0);
        var countText = cc ? (cc === 1 ? '1 chapter' : cc + ' chapters') : '—';
        return '<a class="list-item" href="' + buildUrl('chapters.html', { classId: classId, subjectId: sub.id }) + '">' +
               '<span>' + escapeHtml(sub.name || sub.id) + '</span>' +
               '<span class="count">' + countText + '</span>' +
               '<span class="arrow">›</span></a>';
      }).join('') + '</div>';
  }

  function loadSubjects() {
    if (!navigator.onLine) {
      $content.innerHTML = '<div class="error-banner">You are offline. Please connect to the internet and reload.<br>' +
                           '<a href="index.html">Go back to Classes</a></div>';
      return;
    }

    setUpdating(true);
    Promise.all([
      readData('/classes/' + classId + '/name'),
      getChildSummaries('/classes/' + classId + '/subjects').then(function (subjects) {
        return Promise.all((subjects || []).map(function (sub) {
          return readData('/classes/' + classId + '/subjects/' + sub.id + '/chapters', { shallow: true })
            .then(function (keys) { sub.chapterCount = Object.keys(keys || {}).length; return sub; })
            .catch(function () { sub.chapterCount = 0; return sub; });
        }));
      })
    ]).then(function (parts) {
      setUpdating(false);
      var className = parts[0];
      var subjects = parts[1] || [];
      if (className == null) {
        $content.innerHTML = '<div class="error-banner">This class does not exist.<br>' +
                             '<a href="index.html">Go back to Classes</a></div>';
        return;
      }
      render(String(className), subjects);
    }).catch(function (err) {
      setUpdating(false);
      $content.innerHTML = '<div class="error-banner">Failed to load subjects: ' +
                           escapeHtml(err.message || 'Unknown error') +
                           '<br><a href="index.html">Go back</a></div>';
    });
  }

  $search.addEventListener('input', renderFiltered);
  loadSubjects();
})();
</script>
</body>
</html>
