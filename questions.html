<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Q&amp;A" />
<meta name="application-name" content="Q&amp;A Student" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Questions</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="back-link" id="backLink" href="#" aria-label="Back">‹</a>
      <h1 class="title" id="pageTitle">Questions</h1>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <a id="crumbClass" href="#">…</a>
      <span class="crumb-sep">›</span>
      <a id="crumbSubject" href="#">…</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search questions…" />
  </div>

  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><div>Loading questions…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>
<script src="shared.js"></script>
<script>
(function () {
  const { db, escapeHtml, getParam, buildUrl } = window.APP;
  const classId = getParam('classId');
  const subjectId = getParam('subjectId');
  const chapterId = getParam('chapterId');
  const $title = document.getElementById('pageTitle');
  const $backLink = document.getElementById('backLink');
  const $crumbClass = document.getElementById('crumbClass');
  const $crumbSubject = document.getElementById('crumbSubject');
  const $crumbCurrent = document.querySelector('#breadcrumb .current');
  const $content = document.getElementById('content');
  const $search = document.getElementById('searchInput');

  if (!classId || !subjectId || !chapterId) {
    $content.innerHTML = '<div class="error-banner">Missing class, subject, or chapter.<br><a href="index.html">Go back to Classes</a></div>';
    return;
  }

  $backLink.href = buildUrl('chapters.html', { classId, subjectId });
  $crumbClass.href = buildUrl('subjects.html', { classId });
  $crumbSubject.href = buildUrl('chapters.html', { classId, subjectId });

  let groups = []; // [{ type, items: [{id, type, question, answer}] }]

  Promise.all([
    db.ref(`/classes/${classId}/name`).once('value'),
    db.ref(`/classes/${classId}/subjects/${subjectId}/name`).once('value'),
    db.ref(`/classes/${classId}/subjects/${subjectId}/chapters/${chapterId}/name`).once('value'),
    db.ref(`/classes/${classId}/subjects/${subjectId}/chapters/${chapterId}/questions`).once('value')
  ]).then(([classNameSnap, subNameSnap, chNameSnap, qsSnap]) => {
    const className = classNameSnap.val();
    const subjectName = subNameSnap.val();
    const chapterName = chNameSnap.val();

    if (className === null || subjectName === null || chapterName === null) {
      $content.innerHTML = '<div class="error-banner">This path no longer exists.<br><a href="index.html">Go back to Classes</a></div>';
      return;
    }

    $title.textContent = chapterName;
    document.title = chapterName + ' — Questions';
    $crumbClass.textContent = className;
    $crumbSubject.textContent = subjectName;
    $crumbCurrent.textContent = chapterName;

    const raw = qsSnap.val() || {};
    const items = Object.keys(raw).map(id => ({
      id,
      type: (raw[id].type || 'General').toString().trim(),
      question: raw[id].question || '',
      answer: raw[id].answer || ''
    }));

    // Group by type (preserves first-seen order)
    const groupOrder = [];
    const groupMap = {};
    items.forEach(it => {
      if (!groupMap[it.type]) { groupMap[it.type] = []; groupOrder.push(it.type); }
      groupMap[it.type].push(it);
    });
    groups = groupOrder.map(t => ({ type: t, items: groupMap[t] }));

    render();
  }).catch(err => {
    $content.innerHTML = `<div class="error-banner">Failed to load: ${escapeHtml(err.message)}<br><a href="index.html">Go back</a></div>`;
  });

  function render() {
    const filter = ($search.value || '').trim().toLowerCase();
    if (!groups.length) {
      $content.innerHTML = '<div class="empty">No questions in this chapter yet.</div>';
      return;
    }
    let html = '';
    let anyShown = false;
    groups.forEach(g => {
      const filtered = filter
        ? g.items.filter(it => (it.question || '').toLowerCase().includes(filter))
        : g.items;
      if (!filtered.length) return;
      anyShown = true;
      html += `<div class="group"><div class="group-title">${escapeHtml(g.type)}</div><div class="group-list">`;
      filtered.forEach((it, idx) => {
        const url = buildUrl('answer.html', { classId, subjectId, chapterId, qId: it.id });
        html += `<a class="question-item" href="${url}"><span class="qnum">${idx + 1}.</span><span class="qtext">${escapeHtml(it.question)}</span></a>`;
      });
      html += '</div></div>';
    });
    if (!anyShown) {
      $content.innerHTML = '<div class="empty">No questions match your search.</div>';
      return;
    }
    $content.innerHTML = html;
  }

  $search.addEventListener('input', render);
})();
</script>

</html>
