<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Questions</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://www.gstatic.com" crossorigin />
<link rel="dns-prefetch" href="https://www.gstatic.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="back-link" id="backLink" href="#" aria-label="Back">‹</a>
      <h1 class="title" id="pageTitle">Questions</h1>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <a id="crumbClass" href="#">…</a>
      <span class="crumb-sep">›</span>
      <a id="crumbSubject" href="#">…</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search questions…" />
  </div>

  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><div>Loading questions…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var Store = APP.Store;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var refreshSlice = APP.refreshSlice;
  var setUpdating = APP.setUpdating;

  var classId = getParam('classId');
  var subjectId = getParam('subjectId');
  var chapterId = getParam('chapterId');

  var $title = document.getElementById('pageTitle');
  var $backLink = document.getElementById('backLink');
  var $crumbClass = document.getElementById('crumbClass');
  var $crumbSubject = document.getElementById('crumbSubject');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');
  var $search = document.getElementById('searchInput');

  if (!classId || !subjectId || !chapterId) {
    $content.innerHTML = '<div class="error-banner">Missing class, subject, or chapter.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }
  $backLink.href = buildUrl('chapters.html', { classId: classId, subjectId: subjectId });
  $crumbClass.href = buildUrl('subjects.html', { classId: classId });
  $crumbSubject.href = buildUrl('chapters.html', { classId: classId, subjectId: subjectId });

  var groups = [];

  function buildGroups(rawQuestions) {
    var items = Object.keys(rawQuestions || {}).map(function (id) {
      return {
        id: id,
        type: String((rawQuestions[id] && rawQuestions[id].type) || 'General').trim(),
        question: (rawQuestions[id] && rawQuestions[id].question) || '',
        answer: (rawQuestions[id] && rawQuestions[id].answer) || ''
      };
    });
    var order = [], map = {};
    items.forEach(function (it) {
      if (!map[it.type]) { map[it.type] = []; order.push(it.type); }
      map[it.type].push(it);
    });
    return order.map(function (t) { return { type: t, items: map[t] }; });
  }

  function renderFromTree(tree) {
    var cls = tree && tree[classId];
    if (!cls) return false;
    var sub = cls.subjects && cls.subjects[subjectId];
    if (!sub) return false;
    var ch = sub.chapters && sub.chapters[chapterId];
    if (!ch) return false;

    $title.textContent = ch.name;
    document.title = ch.name + ' — Questions';
    $crumbClass.textContent = cls.name;
    $crumbSubject.textContent = sub.name;
    $crumbCurrent.textContent = ch.name;

    groups = buildGroups(ch.questions);
    render();
    return true;
  }

  function render() {
    var filter = ($search.value || '').trim().toLowerCase();
    if (!groups.length) {
      $content.innerHTML = '<div class="empty">No questions in this chapter yet.</div>';
      return;
    }
    var html = '';
    var anyShown = false;
    groups.forEach(function (g) {
      var filtered = filter
        ? g.items.filter(function (it) {
            return (it.question || '').toLowerCase().includes(filter);
          })
        : g.items;
      if (!filtered.length) return;
      anyShown = true;
      html += '<div class="group"><div class="group-title">' + escapeHtml(g.type) + '</div><div class="group-list">';
      filtered.forEach(function (it, idx) {
        var url = buildUrl('answer.html', { classId: classId, subjectId: subjectId, chapterId: chapterId, qId: it.id });
        html += '<a class="question-item" href="' + url + '">' +
                '<span class="qnum">' + (idx + 1) + '.</span>' +
                '<span class="qtext">' + escapeHtml(it.question) + '</span></a>';
      });
      html += '</div></div>';
    });
    if (!anyShown) {
      $content.innerHTML = '<div class="empty">No questions match your search.</div>';
      return;
    }
    $content.innerHTML = html;
  }

  /* STEP 1: cache render */
  var cached = Store.getTree();
  var cachedOk = !!(cached && renderFromTree(cached));
  if (!cachedOk) {
    $content.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div>Loading questions…</div></div>';
  }

  /* STEP 2: refresh this chapter's slice */
  if (navigator.onLine) {
    setUpdating(true);
    refreshSlice('/classes/' + classId + '/subjects/' + subjectId + '/chapters/' + chapterId)
      .then(function (ch) {
        setUpdating(false);
        if (ch === null && !cachedOk) {
          $content.innerHTML = '<div class="error-banner">This chapter no longer exists.<br>' +
                               '<a href="index.html">Go back to Classes</a></div>';
          return;
        }
        renderFromTree(Store.getTree());
      })
      .catch(function (err) {
        setUpdating(false);
        if (!cachedOk) {
          $content.innerHTML = '<div class="error-banner">Failed to load: ' +
                               escapeHtml(err.message || 'Unknown error') +
                               '<br><a href="index.html">Go back</a></div>';
        }
      });
  }

  $search.addEventListener('input', render);
})();
</script>
</body>
</html>
