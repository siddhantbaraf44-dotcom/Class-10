<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Push Notifications</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b0e1a;
      color: #e8edf9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 1.5rem;
    }
    .card {
      max-width: 620px;
      width: 100%;
      background: rgba(22,28,46,0.85);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.05);
    }
    h1 { font-weight: 600; font-size: 1.8rem; margin-bottom: 0.25rem; }
    h1 span { color: #818cf8; }
    p.sub { color: #9aa4c8; margin-bottom: 1.5rem; }
    .section {
      background: rgba(0,0,0,0.25);
      border-radius: 1rem;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .section h2 { font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7a9f; margin-bottom: 0.75rem; }
    .flex { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #bcc3e0; border: 1px solid rgba(255,255,255,0.06); }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-success { background: #34d399; color: #0b0e1a; }
    .btn-success:hover { background: #6ee7b7; }
    .btn-danger { background: #fb7185; color: #0b0e1a; }
    .btn-danger:hover { background: #fda4af; }
    input, textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.4);
      color: #e8edf9;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    input:focus, textarea:focus { outline: none; border-color: #6366f1; }
    .token-box {
      background: rgba(0,0,0,0.4);
      padding: 0.6rem;
      border-radius: 8px;
      font-size: 0.7rem;
      word-break: break-all;
      font-family: monospace;
      color: #a5b4fc;
      margin-top: 0.5rem;
    }
    pre {
      background: rgba(0,0,0,0.4);
      padding: 0.8rem;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.7rem;
      color: #d4def7;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-success { background: rgba(52,211,153,0.15); color: #34d399; }
    .badge-error { background: rgba(251,113,133,0.15); color: #fb7185; }
    .badge-pending { background: rgba(251,191,36,0.12); color: #fbbf24; }
    hr { border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 1.5rem 0; }
    .note { font-size: 0.7rem; color: #4f5a7a; margin-top: 0.5rem; }
  </style>
</head>
<body>

<div class="card">
  <h1>📡 <span>FCM</span> Push</h1>
  <p class="sub">Subscribe to get notifications, or send one to all subscribers.</p>

  <!-- SUBSCRIBE -->
  <div class="section">
    <h2>🔔 Subscribe</h2>
    <div class="flex">
      <button class="btn btn-primary" id="subscribeBtn">Subscribe</button>
      <button class="btn btn-secondary" id="unsubscribeBtn">Unsubscribe</button>
    </div>
    <div id="tokenDisplay" class="token-box">No token yet</div>
    <div id="subscribeStatus"></div>
  </div>

  <!-- SEND -->
  <div class="section">
    <h2>📨 Send Notification</h2>
    <input type="text" id="sendTitle" placeholder="Title" value="Hello!">
    <textarea id="sendBody" rows="2" placeholder="Body">Test notification from your website.</textarea>
    <div class="flex">
      <button class="btn btn-success" id="sendAllBtn">Send to All</button>
      <button class="btn btn-secondary" id="sendSingleBtn">Send to My Token</button>
    </div>
    <div id="sendResult"></div>
  </div>

  <hr>
  <div style="font-size:0.7rem; color:#4f5a7a;">
    Worker: <span id="workerUrlDisplay">https://shy-recipe-b587.cratee666.workers.dev/</span>
  </div>
</div>

<!-- ─── Firebase SDK (compat) ─── -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<script>
  // ─── YOUR CONFIG ──────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyCnOcZsJpH7QGJ6WZdpguTFV4oBd0XCCYY",
    authDomain: "my-chat-424e7.firebaseapp.com",
    databaseURL: "https://my-chat-424e7-default-rtdb.firebaseio.com",
    projectId: "my-chat-424e7",
    storageBucket: "my-chat-424e7.firebasestorage.app",
    messagingSenderId: "697741479796",
    appId: "1:697741479796:web:991126a18034b0abffa621"
  };

  // ─── YOUR VAPID PUBLIC KEY ────────────────────────────
  const vapidKey = "BNSGEEEazK71ptps5edUqIOPKq0c-Yel97DwF9ZzQmKfSfhUI6orPQr-So8daWL_fE05GAbxUjPrsj3Op7vqufc";

  // ─── WORKER URL ────────────────────────────────────────
  const WORKER_URL = 'https://shy-recipe-b587.cratee666.workers.dev/';

  // ─── INIT ──────────────────────────────────────────────
  firebase.initializeApp(firebaseConfig);
  const messaging = firebase.messaging();

  // ─── DOM ──────────────────────────────────────────────
  const subscribeBtn = document.getElementById('subscribeBtn');
  const unsubscribeBtn = document.getElementById('unsubscribeBtn');
  const tokenDisplay = document.getElementById('tokenDisplay');
  const subscribeStatus = document.getElementById('subscribeStatus');
  const sendTitle = document.getElementById('sendTitle');
  const sendBody = document.getElementById('sendBody');
  const sendAllBtn = document.getElementById('sendAllBtn');
  const sendSingleBtn = document.getElementById('sendSingleBtn');
  const sendResult = document.getElementById('sendResult');
  document.getElementById('workerUrlDisplay').textContent = WORKER_URL;

  function setStatus(el, msg, type = '') {
    el.innerHTML = `<span class="badge badge-${type}">${msg}</span>`;
  }

  async function callWorker(path, payload) {
    const res = await fetch(WORKER_URL + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  // ─── SUBSCRIBE (with manual SW registration) ──────────
  async function subscribe() {
    try {
      setStatus(subscribeStatus, 'Requesting permission...', 'pending');
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        setStatus(subscribeStatus, 'Permission denied', 'error');
        return;
      }

      setStatus(subscribeStatus, 'Registering service worker...', 'pending');
      // Register the service worker from the same directory
      const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
      console.log('SW registered:', registration);

      setStatus(subscribeStatus, 'Getting token...', 'pending');
      const token = await messaging.getToken({
        serviceWorkerRegistration: registration,
        vapidKey: vapidKey
      });
      tokenDisplay.textContent = token;

      const data = await callWorker('subscribe', { token });
      if (data.success) {
        setStatus(subscribeStatus, 'Subscribed! Token saved.', 'success');
      } else {
        setStatus(subscribeStatus, 'Error saving token: ' + (data.error || 'unknown'), 'error');
      }
    } catch (err) {
      setStatus(subscribeStatus, 'Error: ' + err.message, 'error');
      console.error(err);
    }
  }

  // ─── UNSUBSCRIBE (with registration) ──────────────────
  async function unsubscribe() {
    try {
      const registration = await navigator.serviceWorker.ready;
      await messaging.deleteToken({ serviceWorkerRegistration: registration });
      tokenDisplay.textContent = 'No token';
      setStatus(subscribeStatus, 'Unsubscribed', 'success');
    } catch (err) {
      setStatus(subscribeStatus, 'Error: ' + err.message, 'error');
    }
  }

  subscribeBtn.addEventListener('click', subscribe);
  unsubscribeBtn.addEventListener('click', unsubscribe);

  // ─── SEND ──────────────────────────────────────────────
  async function sendNotification(toAll = true) {
    const title = sendTitle.value.trim() || 'Test';
    const body = sendBody.value.trim() || 'Hello!';
    const payload = { title, body };

    if (!toAll) {
      const token = tokenDisplay.textContent;
      if (!token || token === 'No token') {
        setStatus(sendResult, 'No token found. Subscribe first.', 'error');
        return;
      }
      payload.token = token;
    }

    setStatus(sendResult, 'Sending...', 'pending');
    try {
      const data = await callWorker('send', payload);
      setStatus(sendResult, 'Sent! See response below.', 'success');
      sendResult.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    } catch (err) {
      setStatus(sendResult, 'Error: ' + err.message, 'error');
    }
  }

  sendAllBtn.addEventListener('click', () => sendNotification(true));
  sendSingleBtn.addEventListener('click', () => sendNotification(false));

  // ─── CHECK EXISTING TOKEN ON LOAD ──────────────────────
  (async function init() {
    try {
      // Try to get token without registration – might fail if SW not registered yet
      // We'll let the user click Subscribe manually.
      const registration = await navigator.serviceWorker.ready;
      const token = await messaging.getToken({ serviceWorkerRegistration: registration, vapidKey });
      if (token) tokenDisplay.textContent = token;
    } catch (_) { /* ignore */ }
  })();
</script>

<!-- ─── REGISTER SERVICE WORKER MANUALLY ────────────────── -->
<script>
  // We already register inside subscribe(), but we also want to pre-register
  // so that it's available for the init check above.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then(() => console.log('SW pre-registered'))
        .catch(err => console.warn('SW pre-registration failed:', err));
    });
  }
</script>

</body>
</html>
