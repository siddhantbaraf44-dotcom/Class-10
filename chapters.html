<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f6f7fb" />
<meta name="color-scheme" content="light" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Chapters</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://rosho-c2d11-default-rtdb.firebaseio.com" crossorigin />
<link rel="dns-prefetch" href="https://rosho-c2d11-default-rtdb.firebaseio.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="home-link" href="index.html" aria-label="Home"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 11.5 12 5l8 6.5"/><path d="M6.5 10.5V20h11v-9.5"/><path d="M10 20v-5h4v5"/></svg></a>
      <img src="icon.svg" alt="Q&A" class="site-logo" />
      <h1 class="title" id="pageTitle">Chapters</h1>
      <a class="header-action" href="books.html"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6.5 4H18a2 2 0 0 1 2 2v14H7.5A3.5 3.5 0 0 1 4 16.5v-10A2.5 2.5 0 0 1 6.5 4Z"/><path d="M7 16h13"/><path d="M8 8h7"/></svg><span>Books</span></a>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <a id="crumbClass" href="#">…</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search chapters…" />
  </div>

  <div id="content">
    <div class="skeleton-list"><div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item"></div></div>
  </div>
</div>
<footer class="site-footer"><strong>Q&A Student</strong><br>Simple, organized learning for students.</footer>

<a class="bottom-back-btn" id="bottomBackBtn" href="#" aria-label="Back"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M14.8 5.2 8 12l6.8 6.8"/></svg></a>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var readData = APP.readData;
  var getChapterSummaries = APP.getChapterSummaries;
  var svgIcon = APP.svgIcon;
  var setUpdating = APP.setUpdating;

  var classId = getParam('classId');
  var subjectId = getParam('subjectId');

  var $title = document.getElementById('pageTitle');
  var $bottomBack = document.getElementById('bottomBackBtn');
  var $crumbClass = document.getElementById('crumbClass');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');
  var $search = document.getElementById('searchInput');
  var allChapters = [];
  var currentClassName = '';
  var currentSubjectName = '';

  if (!classId || !subjectId) {
    $content.innerHTML = '<div class="error-banner">Missing class or subject.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }
  $bottomBack.href = buildUrl('subjects.html', { classId: classId });
  $crumbClass.href = buildUrl('subjects.html', { classId: classId });

  function render(className, subjectName, chapters) {
    currentClassName = className;
    currentSubjectName = subjectName;
    allChapters = chapters || [];
    $title.textContent = subjectName;
    document.title = subjectName + ' — Chapters';
    $crumbClass.textContent = className;
    $crumbCurrent.textContent = subjectName;
    renderFiltered();
  }

  function renderFiltered() {
    var filter = ($search.value || '').trim().toLowerCase();
    var chapters = filter ? allChapters.filter(function (ch) {
      return String(ch.name || ch.id).toLowerCase().includes(filter);
    }) : allChapters;

    if (!allChapters.length) {
      $content.innerHTML = '<div class="empty">No chapters available.</div>';
      return;
    }
    if (!chapters.length) {
      $content.innerHTML = '<div class="empty">No chapters match your search.</div>';
      return;
    }

    $content.innerHTML = '<div class="page-meta">' + allChapters.length + ' chapter' + (allChapters.length === 1 ? '' : 's') + '</div>' +
      '<div class="list">' + chapters.map(function (ch) {
        var qcount = ch.qcount || 0;
        var countText = qcount === 0 ? '—' :
          (qcount === 1 ? '1 question' : qcount + ' questions');
        return '<a class="list-item" href="' + buildUrl('questions.html', { classId: classId, subjectId: subjectId, chapterId: ch.id }) + '">' +
               svgIcon('chapter') +
               '<span class="card-main"><span class="card-title">' + escapeHtml(ch.name || ch.id) + '</span>' +
               '<span class="card-subtitle">' + escapeHtml(currentSubjectName) + '</span></span>' +
               '<span class="count">' + countText + '</span>' +
               '<span class="arrow">›</span></a>';
      }).join('') + '</div>';
  }

  function loadChapters() {
    if (!navigator.onLine) {
      $content.innerHTML = '<div class="error-banner">You are offline. Please connect to the internet and reload.<br>' +
                           '<a href="index.html">Go back to Classes</a></div>';
      return;
    }

    setUpdating(true);
    Promise.all([
      readData('/classes/' + classId + '/name'),
      readData('/classes/' + classId + '/subjects/' + subjectId + '/name'),
      getChapterSummaries('/classes/' + classId + '/subjects/' + subjectId + '/chapters')
    ]).then(function (parts) {
      setUpdating(false);
      var className = parts[0];
      var subjectName = parts[1];
      var chapters = parts[2] || [];
      if (className == null || subjectName == null) {
        $content.innerHTML = '<div class="error-banner">This class or subject does not exist.<br>' +
                             '<a href="index.html">Go back to Classes</a></div>';
        return;
      }
      render(String(className), String(subjectName), chapters);
    }).catch(function (err) {
      setUpdating(false);
      $content.innerHTML = '<div class="error-banner">Failed to load chapters: ' +
                           escapeHtml(err.message || 'Unknown error') +
                           '<br><a href="index.html">Go back</a></div>';
    });
  }

  $search.addEventListener('input', renderFiltered);
  loadChapters();
})();
</script>
</body>
</html>
