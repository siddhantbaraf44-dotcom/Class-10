<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Answer</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://rosho-c2d11-default-rtdb.firebaseio.com" crossorigin />
<link rel="dns-prefetch" href="https://rosho-c2d11-default-rtdb.firebaseio.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div class="answer-page" id="answerPage">
  <div class="answer-header">
    <a class="back-link" id="backLink" href="#" aria-label="Back">‹</a>
    <div class="answer-counter" id="counter">…</div>
    <div class="update-pill" id="updatePill">Updating…</div>
  </div>
  <div class="answer-body" id="body">
    <div class="answer-type" id="type"></div>
    <div class="answer-question" id="question"></div>
    <div class="answer-text" id="text"></div>
  </div>
  <div class="answer-footer">
    <button class="nav-btn" id="prevBtn">‹ Prev</button>
    <button class="copy-btn" id="copyBtn">Copy</button>
    <button class="nav-btn primary" id="nextBtn">Next ›</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var showToast = APP.showToast;
  var readData = APP.readData;
  var setUpdating = APP.setUpdating;

  var classId = getParam('classId');
  var subjectId = getParam('subjectId');
  var chapterId = getParam('chapterId');
  var qId = getParam('qId');

  var $backLink = document.getElementById('backLink');
  var $counter = document.getElementById('counter');
  var $body = document.getElementById('body');
  var $type = document.getElementById('type');
  var $question = document.getElementById('question');
  var $text = document.getElementById('text');
  var $prev = document.getElementById('prevBtn');
  var $next = document.getElementById('nextBtn');
  var $copy = document.getElementById('copyBtn');

  var flat = [];
  var idx = -1;

  function disableFooter() {
    $prev.disabled = true;
    $next.disabled = true;
    $prev.classList.add('disabled');
    $next.classList.add('disabled');
    $copy.disabled = true;
    $copy.style.opacity = '0.4';
  }

  function enableCopy() {
    $copy.disabled = false;
    $copy.style.opacity = '';
  }

  function showError(html) {
    $body.innerHTML = '<div class="error-banner" style="margin-top:40px;">' + html + '</div>';
    $counter.textContent = '';
    disableFooter();
  }

  function showSpinner() {
    $body.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div>Loading answer…</div></div>';
    $counter.textContent = '';
    disableFooter();
  }

  if (!classId || !subjectId || !chapterId || !qId) {
    showError('Missing parameters.<br><a href="index.html">Go back to Classes</a>');
    return;
  }
  $backLink.href = buildUrl('questions.html', { classId: classId, subjectId: subjectId, chapterId: chapterId });

  function buildFlat(rawQuestions) {
    return Object.keys(rawQuestions || {}).map(function (id) {
      return {
        id: id,
        type: String((rawQuestions[id] && rawQuestions[id].type) || 'General').trim(),
        question: (rawQuestions[id] && rawQuestions[id].question) || '',
        answer: (rawQuestions[id] && rawQuestions[id].answer) || ''
      };
    });
  }

  function show(i) {
    idx = i;
    var q = flat[idx];
    if (!q) return;

    if (!$type.parentNode) {
      $body.innerHTML = '<div class="answer-type" id="type"></div>' +
                        '<div class="answer-question" id="question"></div>' +
                        '<div class="answer-text" id="text"></div>';
      $type = document.getElementById('type');
      $question = document.getElementById('question');
      $text = document.getElementById('text');
    }

    $body.classList.remove('fade-slide');
    void $body.offsetWidth;
    $body.classList.add('fade-slide');

    $type.textContent = q.type || 'General';
    $question.textContent = q.question || '';
    $text.textContent = q.answer || '';
    $counter.textContent = (idx + 1) + ' / ' + flat.length;
    $prev.disabled = idx === 0;
    $next.disabled = idx === flat.length - 1;
    $prev.classList.toggle('disabled', idx === 0);
    $next.classList.toggle('disabled', idx === flat.length - 1);
    enableCopy();
    $copy.classList.remove('copied');
    $copy.textContent = 'Copy';
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  function loadAnswer() {
    if (!navigator.onLine) {
      showError('You are offline. Please connect to the internet and reload.<br><a href="index.html">Go back to Classes</a>');
      return;
    }

    showSpinner();
    setUpdating(true);
    readData('/classes/' + classId + '/subjects/' + subjectId + '/chapters/' + chapterId + '/questions')
      .then(function (raw) {
        setUpdating(false);
        if (raw === null) {
          showError('This chapter does not exist or has no questions.<br>' +
                    '<a href="index.html">Go back to Classes</a>');
          return;
        }
        flat = buildFlat(raw);
        var newIdx = flat.findIndex(function (q) { return q.id === qId; });
        if (newIdx === -1) {
          showError('This question does not exist.<br>' +
                    '<a href="' + buildUrl('questions.html', { classId: classId, subjectId: subjectId, chapterId: chapterId }) +
                    '">Back to Questions</a>');
          return;
        }
        show(newIdx);
      })
      .catch(function (err) {
        setUpdating(false);
        showError('Failed to load answer: ' + escapeHtml(err.message || 'Unknown error') +
                  '<br><a href="index.html">Go back</a>');
      });
  }

  $prev.addEventListener('click', function () { if (idx > 0) show(idx - 1); });
  $next.addEventListener('click', function () { if (idx < flat.length - 1) show(idx + 1); });

  $copy.addEventListener('click', async function () {
    var text = $text.textContent || '';
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      $copy.classList.add('copied');
      $copy.textContent = 'Copied ✓';
      showToast('Answer copied');
      setTimeout(function () {
        if ($copy.classList.contains('copied')) {
          $copy.classList.remove('copied');
          $copy.textContent = 'Copy';
        }
      }, 1500);
    } catch (e) {
      showToast('Copy failed');
    }
  });

  var sx = null, sy = null, st = 0;
  document.addEventListener('touchstart', function (e) {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
  }, { passive: true });
  document.addEventListener('touchend', function (e) {
    if (sx === null) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - st;
    if (dt < 600 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) { if (idx < flat.length - 1) show(idx + 1); }
      else         { if (idx > 0) show(idx - 1); }
    }
    sx = sy = null;
  }, { passive: true });

  loadAnswer();
})();
</script>
</body>
</html>
