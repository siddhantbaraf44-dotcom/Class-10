<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Subjects</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://www.gstatic.com" crossorigin />
<link rel="dns-prefetch" href="https://www.gstatic.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="back-link" href="index.html" aria-label="Back">‹</a>
      <h1 class="title" id="pageTitle">Subjects</h1>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>
  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><div>Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var Store = APP.Store;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var refreshSlice = APP.refreshSlice;
  var setUpdating = APP.setUpdating;

  var classId = getParam('classId');
  var getName = function (o) {
    return (o == null ? '' :
            (typeof o === 'object' && o.name != null) ? String(o.name) : String(o));
  };

  var $title = document.getElementById('pageTitle');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');

  if (!classId) {
    $content.innerHTML = '<div class="error-banner">No class selected.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    $title.textContent = 'Subjects';
    return;
  }

  function renderFromTree(tree) {
    var cls = tree && tree[classId];
    if (!cls) return false;
    var className = cls.name;
    var subs = cls.subjects || {};
    $title.textContent = className;
    document.title = className + ' — Subjects';
    $crumbCurrent.textContent = className;

    var ids = Object.keys(subs).sort(function (a, b) {
      return getName(subs[a]).localeCompare(
        getName(subs[b]), undefined, { numeric: true });
    });
    if (!ids.length) {
      $content.innerHTML = '<div class="empty">No subjects available.</div>';
      return true;
    }
    $content.innerHTML = '<div class="list">' + ids.map(function (id) {
      return '<a class="list-item" href="' + buildUrl('chapters.html', { classId: classId, subjectId: id }) + '">' +
             '<span>' + escapeHtml(getName(subs[id])) + '</span>' +
             '<span class="arrow">›</span></a>';
    }).join('') + '</div>';
    return true;
  }

  /* STEP 1: render from cache */
  var cached = Store.getTree();
  var cachedOk = !!(cached && renderFromTree(cached));
  if (!cachedOk) {
    $content.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div>Loading…</div></div>';
  }

  /* STEP 2: background refresh — fetch only this class's slice */
  if (navigator.onLine) {
    setUpdating(true);
    refreshSlice('/classes/' + classId).then(function (cls) {
      setUpdating(false);
      if (cls === null && !cachedOk) {
        $content.innerHTML = '<div class="error-banner">This class no longer exists.<br>' +
                             '<a href="index.html">Go back to Classes</a></div>';
        return;
      }
      /* Re-render from updated cache. */
      renderFromTree(Store.getTree());
    }).catch(function (err) {
      setUpdating(false);
      if (!cachedOk) {
        $content.innerHTML = '<div class="error-banner">Failed to load: ' +
                             escapeHtml(err.message || 'Unknown error') +
                             '<br><a href="index.html">Go back</a></div>';
      }
    });
  }
})();
</script>
</body>
</html>
