<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<meta name="description" content="Browse educational questions and answers by class, subject and chapter." />
<title>Classes</title>

<!-- Inline SVG favicon (no extra HTTP request). -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://www.gstatic.com" crossorigin />
<link rel="dns-prefetch" href="https://www.gstatic.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <h1 class="title">Classes</h1>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb"><span class="current">Classes</span></div>

    <div class="search-bar-global">
      <span class="search-icon">⌕</span>
      <input
        type="search"
        class="search-input"
        id="searchInput"
        placeholder="Search all questions…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button class="search-clear" id="searchClear" aria-label="Clear" style="display:none;">×</button>
    </div>
  </div>

  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><div>Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- shared.js loads synchronously BEFORE the page script so the cache
     read happens during HTML parse, no extra round-trip. -->
<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var Store = APP.Store;
  var escapeHtml = APP.escapeHtml;
  var buildUrl = APP.buildUrl;
  var refreshTree = APP.refreshTree;
  var setUpdating = APP.setUpdating;

  var $content = document.getElementById('content');
  var $search = document.getElementById('searchInput');
  var $clear = document.getElementById('searchClear');

  var allData = null;
  var allQuestions = [];
  var debounceTimer = null;

  /* Build a flat search index from the /classes tree. */
  function buildIndex(data) {
    var items = [];
    Object.keys(data || {}).forEach(function (cId) {
      var cName = (data[cId] && data[cId].name) || '';
      var subs = (data[cId] && data[cId].subjects) || {};
      Object.keys(subs).forEach(function (sId) {
        var sName = (subs[sId] && subs[sId].name) || '';
        var chs = (subs[sId] && subs[sId].chapters) || {};
        Object.keys(chs).forEach(function (chId) {
          var chName = (chs[chId] && chs[chId].name) || '';
          var qs = (chs[chId] && chs[chId].questions) || {};
          Object.keys(qs).forEach(function (qId) {
            items.push({
              id: qId,
              classId: cId,
              className: cName,
              subjectId: sId,
              subjectName: sName,
              chapterId: chId,
              chapterName: chName,
              type: String((qs[qId] && qs[qId].type) || ''),
              question: String((qs[qId] && qs[qId].question) || ''),
              answer: String((qs[qId] && qs[qId].answer) || '')
            });
          });
        });
      });
    });
    return items;
  }

  function renderClassList() {
    if (!allData) return;
    var cIds = Object.keys(allData).sort(function (a, b) {
      return String(allData[a].name).localeCompare(
        String(allData[b].name), undefined, { numeric: true });
    });
    if (!cIds.length) {
      $content.innerHTML = '<div class="empty">No classes available yet.</div>';
      return;
    }
    $content.innerHTML = '<div class="list">' + cIds.map(function (id) {
      return '<a class="list-item" href="' + buildUrl('subjects.html', { classId: id }) + '">' +
             '<span>' + escapeHtml(allData[id].name) + '</span>' +
             '<span class="arrow">›</span></a>';
    }).join('') + '</div>';
  }

  function doSearch() {
    var q = ($search.value || '').trim();
    var qLow = q.toLowerCase();
    $clear.style.display = q ? 'flex' : 'none';

    if (!q) { renderClassList(); return; }
    if (!allQuestions.length) {
      $content.innerHTML = '<div class="empty">No questions in database yet.</div>';
      return;
    }
    var filtered = allQuestions.filter(function (it) {
      return (it.question || '').toLowerCase().includes(qLow) ||
             (it.type || '').toLowerCase().includes(qLow);
    });
    if (!filtered.length) {
      $content.innerHTML = '<div class="empty">No questions match &ldquo;' +
                           escapeHtml(q) + '&rdquo;.<br>Try a different keyword.</div>';
      return;
    }

    /* Group by chapter, preserve first-appearance order. */
    var groups = new Map();
    filtered.forEach(function (it) {
      var key = it.classId + '||' + it.subjectId + '||' + it.chapterId;
      if (!groups.has(key)) {
        groups.set(key, {
          classId: it.classId, subjectId: it.subjectId, chapterId: it.chapterId,
          className: it.className, subjectName: it.subjectName, chapterName: it.chapterName,
          items: []
        });
      }
      groups.get(key).items.push(it);
    });

    var html = '<div class="search-meta">' + filtered.length +
               ' result' + (filtered.length === 1 ? '' : 's') +
               ' for &ldquo;' + escapeHtml(q) + '&rdquo;</div>';

    groups.forEach(function (g) {
      html += '<div class="search-group">';
      html += '<div class="search-group-path">';
      html += '<a href="' + buildUrl('subjects.html', { classId: g.classId }) + '">' +
              escapeHtml(g.className) + '</a>';
      html += '<span class="crumb-sep">›</span>';
      html += '<a href="' + buildUrl('chapters.html', { classId: g.classId, subjectId: g.subjectId }) + '">' +
              escapeHtml(g.subjectName) + '</a>';
      html += '<span class="crumb-sep">›</span>';
      html += '<span class="current">' + escapeHtml(g.chapterName) + '</span>';
      html += '</div><div class="search-group-list">';
      g.items.forEach(function (it, idx) {
        var url = buildUrl('answer.html', {
          classId: it.classId, subjectId: it.subjectId,
          chapterId: it.chapterId, qId: it.id
        });
        html += '<a class="search-result" href="' + url + '">';
        html += '<span class="result-num">' + (idx + 1) + '.</span>';
        html += '<div class="result-body">';
        if (it.type) html += '<div class="result-type">' + escapeHtml(it.type) + '</div>';
        html += '<div class="result-text">' + escapeHtml(it.question) + '</div>';
        html += '</div></a>';
      });
      html += '</div></div>';
    });

    $content.innerHTML = html;
  }

  /* ===== Apply tree to UI ===== */
  function renderWith(data, prevSig) {
    var sig = JSON.stringify(data).length; /* cheap pre-check */
    allData = data;
    allQuestions = buildIndex(data);
    /* Restore search query from URL hash. */
    var m = (window.location.hash || '').match(/^#q=(.*)$/);
    if (m && m[1]) { try { $search.value = decodeURIComponent(m[1]); } catch (e) {} }
    doSearch();
  }

  /* ===== STEP 1: Render from localStorage cache (synchronous, instant) ===== */
  var cached = Store.getTree();
  if (cached) {
    renderWith(cached);
  } else {
    $content.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div>Loading…</div></div>';
  }

  /* ===== STEP 2: Background refresh from Firebase (non-blocking) ===== */
  if (navigator.onLine) {
    setUpdating(true);
    refreshTree().then(function (fresh) {
      setUpdating(false);
      /* Only re-render if the data actually changed. */
      if (JSON.stringify(fresh) !== JSON.stringify(allData)) {
        renderWith(fresh);
      }
    }).catch(function (err) {
      setUpdating(false);
      if (!cached) {
        $content.innerHTML = '<div class="error-banner">Failed to load: ' +
                             escapeHtml(err.message || 'Unknown error') + '</div>';
      }
    });
  }

  /* ===== Search input wiring ===== */
  $search.addEventListener('input', function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      var q = ($search.value || '').trim();
      var newHash = q ? '#q=' + encodeURIComponent(q) : '';
      if ((window.location.hash || '') !== newHash) {
        history.replaceState(null, '', window.location.pathname + (newHash || ''));
      }
      doSearch();
    }, 180);
  });
  $search.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { $search.value = ''; doSearch(); }
  });
  $clear.addEventListener('click', function () {
    $search.value = '';
    history.replaceState(null, '', window.location.pathname);
    doSearch();
    $search.focus();
  });
})();
</script>
</body>
</html>
