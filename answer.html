<head>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://rosho-c2d11-default-rtdb.firebaseio.com" crossorigin />
<link rel="dns-prefetch" href="https://rosho-c2d11-default-rtdb.firebaseio.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div class="answer-page" id="answerPage">
  <div class="answer-header">
    <a class="home-link" href="index.html" aria-label="Home">⌂</a>
    <img src="icon.svg" alt="Q&A" class="site-logo" />
    <div class="answer-counter" id="counter">…</div>
    <a class="header-action" href="books.html">Books</a>
    <div class="update-pill" id="updatePill">Updating…</div>
  </div>
  <div class="answer-body" id="body">
    <div class="skeleton-list" id="answerLoader">
      <div class="skeleton-heading"></div>
      <div class="skeleton-item"></div>
      <div class="skeleton-item"></div>
      <div class="skeleton-item short"></div>
    </div>
  </div>
  <a class="bottom-back-btn" id="bottomBackBtn" href="#" aria-label="Back"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M14.8 5.2 8 12l6.8 6.8"/></svg></a>
  <div class="answer-footer">
    <a class="nav-btn" id="allQuestionsBtn" href="#">All Questions</a>
    <button class="nav-btn disabled" id="prevBtn" disabled>‹ Prev</button>
    <button class="nav-btn primary disabled" id="nextBtn" disabled>Next ›</button>
  </div>
</div>
<footer class="site-footer"><strong>Q&A Student</strong><br>Simple, organized learning for students.</footer>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var readData = APP.readData;
  var setUpdating = APP.setUpdating;
  var setPageMeta = APP.setPageMeta;
  var resolveClassSlug = APP.resolveClassSlug;
  var resolveSubjectSlug = APP.resolveSubjectSlug;
  var resolveChapterSlug = APP.resolveChapterSlug;
  var loadClassById = APP.loadClassById;
  var loadSubjectById = APP.loadSubjectById;
  var loadChapterById = APP.loadChapterById;

  var classSlug = getParam('class');
  var classId = getParam('classId');
  var subjectSlug = getParam('subject');
  var subjectId = getParam('subjectId');
  var chapterSlug = getParam('chapter');
  var chapterId = getParam('chapterId');
  var qId = getParam('qId');

  var $counter = document.getElementById('counter');
  var $body = document.getElementById('body');
  var $type = document.getElementById('type');
  var $question = document.getElementById('question');
  var $imageWrap = document.getElementById('imageWrap');
  var $text = document.getElementById('text');
  var $allQuestions = document.getElementById('allQuestionsBtn');
  var $bottomBack = document.getElementById('bottomBackBtn');
  var $prev = document.getElementById('prevBtn');
  var $next = document.getElementById('nextBtn');

  var flat = [];
  var idx = -1;
  var resolvedClass = null;
  var resolvedSubject = null;
  var resolvedChapter = null;

  function disableFooter() {
    $prev.disabled = true;
    $next.disabled = true;
    $prev.classList.add('disabled');
    $next.classList.add('disabled');
  }

  function showError(html) {
    $body.innerHTML = '<div class="error-banner" style="margin-top:40px;">' + html + '</div>';
    $counter.textContent = '';
    disableFooter();
  }

  function showSpinner() {
    $body.innerHTML = '<div class="skeleton-list"><div class="skeleton-heading"></div><div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item short"></div></div>';
    $counter.textContent = '';
    disableFooter();
  }

  if ((!classSlug && !classId) || (!subjectSlug && !subjectId) || (!chapterSlug && !chapterId) || !qId) {
    showError('Missing parameters.<br><a href="index.html">Go back to Classes</a>');
    return;
  }

  function resolveClassInfo() {
    if (classSlug) {
      return resolveClassSlug(classSlug).then(function (res) {
        if (res) return res;
        if (classId) return loadClassById(classId);
        return null;
      });
    }
    if (classId) return loadClassById(classId);
    return Promise.resolve(null);
  }

  function resolveSubjectInfo(classInfo) {
    if (subjectSlug) {
      return resolveSubjectSlug(classInfo.id, subjectSlug).then(function (res) {
        if (res) return res;
        if (subjectId) return loadSubjectById(classInfo.id, subjectId);
        return null;
      });
    }
    if (subjectId) return loadSubjectById(classInfo.id, subjectId);
    return Promise.resolve(null);
  }

  function resolveChapterInfo(classInfo, subjectInfo) {
    if (chapterSlug) {
      return resolveChapterSlug(classInfo.id, subjectInfo.id, chapterSlug).then(function (res) {
        if (res) return res;
        if (chapterId) return loadChapterById(classInfo.id, subjectInfo.id, chapterId);
        return null;
      });
    }
    if (chapterId) return loadChapterById(classInfo.id, subjectInfo.id, chapterId);
    return Promise.resolve(null);
  }

  function getImageUrls(q) {
    var raw = [];
    function add(v) {
      if (!v) return;
      if (Array.isArray(v)) { v.forEach(add); return; }
      if (typeof v === 'object') {
        if (v.url) add(v.url);
        return;
      }
      String(v).split(/[\n,]+/).forEach(function (part) {
        part = part.trim();
        if (part) raw.push(part);
      });
    }
    add(q.imageUrl);
    add(q.imageURL);
    add(q.image);
    add(q.images);
    add(q.imageUrls);
    add(q.questionImageUrl);
    add(q.answerImageUrl);
    return raw.filter(function (url, idx, arr) {
      return isSafeImageUrl(url) && arr.indexOf(url) === idx;
    });
  }

  function isSafeImageUrl(url) {
    return /^(https?:\/\/|data:image\/)/i.test(String(url || '').trim());
  }

  function buildFlat(rawQuestions) {
    return Object.keys(rawQuestions || {}).map(function (id) {
      var raw = rawQuestions[id] || {};
      return {
        id: id,
        type: String((raw && raw.type) || 'General').trim(),
        question: (raw && raw.question) || '',
        answer: (raw && raw.answer) || '',
        imageUrls: getImageUrls(raw)
      };
    });
  }

  function renderImages(urls) {
    if (!$imageWrap) return;
    $imageWrap.innerHTML = '';
    if (!urls || !urls.length) {
      $imageWrap.classList.remove('show');
      return;
    }
    urls.forEach(function (url, idx) {
      var link = document.createElement('a');
      link.className = 'answer-image-link';
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';

      var img = document.createElement('img');
      img.className = 'answer-image';
      img.src = url;
      img.alt = 'Question image ' + (idx + 1);
      img.loading = 'lazy';
      img.onerror = function () {
        var err = document.createElement('div');
        err.className = 'answer-image-error';
        err.textContent = 'Image failed to load: ' + url;
        link.replaceWith(err);
      };
      link.appendChild(img);
      $imageWrap.appendChild(link);
    });
    $imageWrap.classList.add('show');
  }

  function show(i) {
    idx = i;
    var q = flat[idx];
    if (!q) return;

    if (!$type || !$type.parentNode) {
      $body.innerHTML = '<div class="answer-type" id="type"></div>' +
                        '<div class="answer-question" id="question"></div>' +
                        '<div class="answer-image-list" id="imageWrap"></div>' +
                        '<div class="answer-text" id="text"></div>';
      $type = document.getElementById('type');
      $question = document.getElementById('question');
      $imageWrap = document.getElementById('imageWrap');
      $text = document.getElementById('text');
    }

    $body.classList.remove('fade-slide');
    void $body.offsetWidth;
    $body.classList.add('fade-slide');

    $type.textContent = q.type || 'General';
    $question.textContent = q.question || '';
    renderImages(q.imageUrls);
    $text.textContent = q.answer || '';
    $counter.textContent = (idx + 1) + ' / ' + flat.length;
    $prev.disabled = idx === 0;
    $next.disabled = idx === flat.length - 1;
    $prev.classList.toggle('disabled', idx === 0);
    $next.classList.toggle('disabled', idx === flat.length - 1);
    window.scrollTo({ top: 0, behavior: 'auto' });

    setPageMeta({
      title: (q.question || 'Answer') + ' - ' + (resolvedChapter ? resolvedChapter.name : '') + ' ' + (resolvedSubject ? resolvedSubject.name : '') + ' ' + (resolvedClass ? resolvedClass.name : '') + ' SSC Maharashtra Board Answer | QClasses',
      description: 'Exercise questions and answers of ' + (resolvedSubject ? resolvedSubject.name : '') + ' ' + (resolvedClass ? resolvedClass.name : '') + ' SSC Maharashtra Board Chapter ' + (resolvedChapter ? resolvedChapter.name : '') + '. All exercise questions with solutions for exam preparation.',
      canonical: window.location.href
    });
  }

  function loadAnswer() {
    if (!navigator.onLine) {
      showError('You are offline. Please connect to the internet and reload.<br><a href="index.html">Go back to Classes</a>');
      return;
    }

    showSpinner();
    setUpdating(true);
    resolveClassInfo().then(function (classInfo) {
      if (!classInfo) throw new Error('Class not found');
      return resolveSubjectInfo(classInfo).then(function (subjectInfo) {
        if (!subjectInfo) throw new Error('Subject not found');
        return resolveChapterInfo(classInfo, subjectInfo).then(function (chapterInfo) {
          if (!chapterInfo) throw new Error('Chapter not found');
          resolvedClass = classInfo;
          resolvedSubject = subjectInfo;
          resolvedChapter = chapterInfo;

          var backParams = {};
          if (classInfo.slug) backParams.class = classInfo.slug;
          else if (classInfo.id) backParams.classId = classInfo.id;
          if (subjectInfo.slug) backParams.subject = subjectInfo.slug;
          else if (subjectInfo.id) backParams.subjectId = subjectInfo.id;
          if (chapterInfo.slug) backParams.chapter = chapterInfo.slug;
          else if (chapterInfo.id) backParams.chapterId = chapterInfo.id;
          $bottomBack.href = buildUrl('questions.html', backParams);
          $allQuestions.href = buildUrl('questions.html', backParams);

          return readData('/classes/' + classInfo.id + '/subjects/' + subjectInfo.id + '/chapters/' + chapterInfo.id + '/questions');
        });
      });
    }).then(function (raw) {
      setUpdating(false);
      if (raw === null) {
        showError('This chapter does not exist or has no questions.<br>' +
                  '<a href="index.html">Go back to Classes</a>');
        return;
      }
      flat = buildFlat(raw);
      var newIdx = flat.findIndex(function (q) { return q.id === qId; });
      if (newIdx === -1) {
        var backParams = {};
        if (resolvedClass) {
          if (resolvedClass.slug) backParams.class = resolvedClass.slug;
          else if (resolvedClass.id) backParams.classId = resolvedClass.id;
        }
        if (resolvedSubject) {
          if (resolvedSubject.slug) backParams.subject = resolvedSubject.slug;
          else if (resolvedSubject.id) backParams.subjectId = resolvedSubject.id;
        }
        if (resolvedChapter) {
          if (resolvedChapter.slug) backParams.chapter = resolvedChapter.slug;
          else if (resolvedChapter.id) backParams.chapterId = resolvedChapter.id;
        }
        showError('This question does not exist.<br>' +
          '<a href="' + buildUrl('questions.html', backParams) + '">Back to Questions</a>');
        return;
      }
      show(newIdx);
    })
    .catch(function (err) {
      setUpdating(false);
      showError('Failed to load answer: ' + escapeHtml(err.message || 'Unknown error') +
                '<br><a href="index.html">Go back</a>');
    });
  }

  $prev.addEventListener('click', function () { if (idx > 0) show(idx - 1); });
  $next.addEventListener('click', function () { if (idx < flat.length - 1) show(idx + 1); });

  var sx = null, sy = null, st = 0;
  document.addEventListener('touchstart', function (e) {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
  }, { passive: true });
  document.addEventListener('touchend', function (e) {
    if (sx === null) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - st;
    if (dt < 600 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) { if (idx < flat.length - 1) show(idx + 1); }
      else         { if (idx > 0) show(idx - 1); }
    }
    sx = sy = null;
  }, { passive: true });

  loadAnswer();
})();
</script>
</body>
</html>
