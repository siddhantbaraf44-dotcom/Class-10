<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Q&amp;A" />
<meta name="application-name" content="Q&amp;A Student" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Answer</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div class="answer-page" id="answerPage">
  <div class="answer-header">
    <a class="back-link" id="backLink" href="#" aria-label="Back">‹</a>
    <div class="answer-counter" id="counter">1 / 1</div>
  </div>
  <div class="answer-body" id="body">
    <div class="answer-type" id="type"></div>
    <div class="answer-question" id="question"></div>
    <div class="answer-text" id="text"></div>
  </div>
  <div class="answer-footer">
    <button class="nav-btn" id="prevBtn">‹ Prev</button>
    <button class="copy-btn" id="copyBtn">Copy</button>
    <button class="nav-btn primary" id="nextBtn">Next ›</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>
<script src="shared.js"></script>
<script>
(function () {
  const { db, escapeHtml, getParam, buildUrl, showToast } = window.APP;
  const classId = getParam('classId');
  const subjectId = getParam('subjectId');
  const chapterId = getParam('chapterId');
  const qId = getParam('qId');

  const $backLink = document.getElementById('backLink');
  const $counter = document.getElementById('counter');
  const $body = document.getElementById('body');
  const $type = document.getElementById('type');
  const $question = document.getElementById('question');
  const $text = document.getElementById('text');
  const $prev = document.getElementById('prevBtn');
  const $next = document.getElementById('nextBtn');
  const $copy = document.getElementById('copyBtn');

  function showError(html) {
    $body.innerHTML = `<div class="error-banner" style="margin-top:40px;">${html}</div>`;
    $counter.textContent = '';
    $prev.disabled = $next.disabled = true;
    $prev.classList.add('disabled'); $next.classList.add('disabled');
    $copy.disabled = true;
    $copy.style.opacity = '0.4';
  }

  if (!classId || !subjectId || !chapterId || !qId) {
    showError('Missing parameters.<br><a href="index.html">Go back to Classes</a>');
    return;
  }

  $backLink.href = buildUrl('questions.html', { classId, subjectId, chapterId });

  let flat = []; // [{id, type, question, answer}]
  let idx = 0;

  Promise.all([
    db.ref(`/classes/${classId}/subjects/${subjectId}/chapters/${chapterId}/questions`).once('value')
  ]).then(([qsSnap]) => {
    const raw = qsSnap.val() || {};

    // Preserve original Firebase key order so the navigation order is stable
    const ids = Object.keys(raw);
    const items = ids.map(id => ({
      id,
      type: (raw[id].type || 'General').toString().trim(),
      question: raw[id].question || '',
      answer: raw[id].answer || ''
    }));

    // Keep the on-disk order (push IDs are time-ordered, so this is the creation order)
    flat = items;

    idx = flat.findIndex(q => q.id === qId);
    if (idx === -1) {
      showError('This question no longer exists.<br><a href="' + buildUrl('questions.html', { classId, subjectId, chapterId }) + '">Back to Questions</a>');
      return;
    }
    show(idx);
  }).catch(err => {
    showError('Failed to load: ' + escapeHtml(err.message) + '<br><a href="index.html">Go back</a>');
  });

  function show(i) {
    idx = i;
    const q = flat[idx];
    if (!q) return;

    // Fade transition
    $body.classList.remove('fade-slide');
    void $body.offsetWidth;
    $body.classList.add('fade-slide');

    $type.textContent = q.type || 'General';
    $question.textContent = q.question || '';
    $text.textContent = q.answer || '';
    $counter.textContent = `${idx + 1} / ${flat.length}`;
    $prev.disabled = idx === 0;
    $next.disabled = idx === flat.length - 1;
    $prev.classList.toggle('disabled', idx === 0);
    $next.classList.toggle('disabled', idx === flat.length - 1);
    $copy.classList.remove('copied');
    $copy.textContent = 'Copy';
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  $prev.addEventListener('click', () => { if (idx > 0) show(idx - 1); });
  $next.addEventListener('click', () => { if (idx < flat.length - 1) show(idx + 1); });

  $copy.addEventListener('click', async () => {
    const text = $text.textContent || '';
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      $copy.classList.add('copied');
      $copy.textContent = 'Copied ✓';
      showToast('Answer copied');
      setTimeout(() => {
        if ($copy.classList.contains('copied')) {
          $copy.classList.remove('copied');
          $copy.textContent = 'Copy';
        }
      }, 1500);
    } catch (e) {
      showToast('Copy failed');
    }
  });

  // Swipe gestures (horizontal)
  let sx = null, sy = null, st = 0;
  document.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now();
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (sx === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - st;
    if (dt < 600 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) { if (idx < flat.length - 1) show(idx + 1); }
      else         { if (idx > 0) show(idx - 1); }
    }
    sx = sy = null;
  }, { passive: true });

  // Keyboard nav (desktop / external keyboard)
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' && idx > 0) show(idx - 1);
    if (e.key === 'ArrowRight' && idx < flat.length - 1) show(idx + 1);
  });
})();
</script>
