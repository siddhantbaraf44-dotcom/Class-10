<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Chapters</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://www.gstatic.com" crossorigin />
<link rel="dns-prefetch" href="https://www.gstatic.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="back-link" id="backLink" href="#" aria-label="Back">‹</a>
      <h1 class="title" id="pageTitle">Chapters</h1>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <a id="crumbClass" href="#">…</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>
  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><div>Loading chapters…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var Store = APP.Store;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var refreshSlice = APP.refreshSlice;
  var setUpdating = APP.setUpdating;

  var classId = getParam('classId');
  var subjectId = getParam('subjectId');

  var $title = document.getElementById('pageTitle');
  var $backLink = document.getElementById('backLink');
  var $crumbClass = document.getElementById('crumbClass');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');

  if (!classId || !subjectId) {
    $content.innerHTML = '<div class="error-banner">Missing class or subject.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }
  $backLink.href = buildUrl('subjects.html', { classId: classId });
  $crumbClass.href = buildUrl('subjects.html', { classId: classId });

  function renderFromTree(tree) {
    var cls = tree && tree[classId];
    if (!cls) return false;
    var className = cls.name;
    var sub = cls.subjects && cls.subjects[subjectId];
    if (!sub) return false;
    var subjectName = sub.name;
    var chapters = sub.chapters || {};

    $title.textContent = subjectName;
    document.title = subjectName + ' — Chapters';
    $crumbClass.textContent = className;
    $crumbCurrent.textContent = subjectName;

    var ids = Object.keys(chapters).sort(function (a, b) {
      return String(chapters[a].name).localeCompare(
        String(chapters[b].name), undefined, { numeric: true });
    });
    if (!ids.length) {
      $content.innerHTML = '<div class="empty">No chapters available.</div>';
      return true;
    }
    /* Render list immediately; counts filled in from cache if present. */
    $content.innerHTML = '<div class="list">' + ids.map(function (id) {
      var qcount = (chapters[id].questions)
        ? Object.keys(chapters[id].questions).length : 0;
      var countText = qcount === 0 ? '—'
        : (qcount === 1 ? '1 question' : qcount + ' questions');
      return '<a class="list-item" href="' + buildUrl('questions.html', { classId: classId, subjectId: subjectId, chapterId: id }) + '">' +
             '<span>' + escapeHtml(chapters[id].name) + '</span>' +
             '<span class="count">' + countText + '</span>' +
             '<span class="arrow">›</span></a>';
    }).join('') + '</div>';
    return true;
  }

  /* STEP 1: cache render */
  var cached = Store.getTree();
  var cachedOk = !!(cached && renderFromTree(cached));
  if (!cachedOk) {
    $content.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div>Loading chapters…</div></div>';
  }

  /* STEP 2: refresh just this subject's slice */
  if (navigator.onLine) {
    setUpdating(true);
    refreshSlice('/classes/' + classId + '/subjects/' + subjectId).then(function (sub) {
      setUpdating(false);
      if (sub === null && !cachedOk) {
        $content.innerHTML = '<div class="error-banner">This subject no longer exists.<br>' +
                             '<a href="index.html">Go back to Classes</a></div>';
        return;
      }
      renderFromTree(Store.getTree());
    }).catch(function (err) {
      setUpdating(false);
      if (!cachedOk) {
        $content.innerHTML = '<div class="error-banner">Failed to load: ' +
                             escapeHtml(err.message || 'Unknown error') +
                             '<br><a href="index.html">Go back</a></div>';
      }
    });
  }
})();
</script>
</body>
</html>
