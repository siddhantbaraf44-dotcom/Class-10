<title>Subjects</title>

<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="back-link" href="index.html" aria-label="Back">‹</a>
      <h1 class="title" id="pageTitle">Subjects</h1>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>
  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><div>Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>
<script src="shared.js"></script>
<script>
(function () {
  const { db, escapeHtml, getParam, buildUrl } = window.APP;
  const classId = getParam('classId');

  // Extract a displayable name from either a string ("Class 10")
  // or an object ({ name: "Class 10" }), or return '' for null.
  const getName = o => (o == null ? '' : (typeof o === 'object' && o.name != null) ? String(o.name) : String(o));

  const $title = document.getElementById('pageTitle');
  const $crumbCurrent = document.querySelector('#breadcrumb .current');
  const $content = document.getElementById('content');

  if (!classId) {
    $content.innerHTML = '<div class="error-banner">No class selected.<br><a href="index.html">Go back to Classes</a></div>';
    $title.textContent = 'Subjects';
    return;
  }

  // Fetch class name + subjects in parallel
  Promise.all([
    db.ref(`/classes/${classId}/name`).once('value'),
    db.ref(`/classes/${classId}/subjects`).once('value')
  ]).then(([nameSnap, subsSnap]) => {
    const className = nameSnap.val();
    if (className === null) {
      $content.innerHTML = '<div class="error-banner">This class no longer exists.<br><a href="index.html">Go back to Classes</a></div>';
      $title.textContent = 'Subjects';
      return;
    }

    $title.textContent = className;
    document.title = className + ' — Subjects';
    $crumbCurrent.textContent = className;

    const subs = subsSnap.val() || {};
    const ids = Object.keys(subs).sort((a, b) =>
      getName(subs[a]).localeCompare(getName(subs[b]), undefined, { numeric: true })
    );

    if (!ids.length) {
      $content.innerHTML = '<div class="empty">No subjects available.</div>';
      return;
    }
    $content.innerHTML = '<div class="list">' + ids.map(id => `
      <a class="list-item" href="${buildUrl('chapters.html', { classId, subjectId: id })}">
        <span>${escapeHtml(getName(subs[id]))}</span>
        <span class="arrow">›</span>
      </a>
    `).join('') + '</div>';
  }).catch(err => {
    $content.innerHTML = `<div class="error-banner">Failed to load: ${escapeHtml(err.message)}<br><a href="index.html">Go back</a></div>`;
  });
})();
</script>
