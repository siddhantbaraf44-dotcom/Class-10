<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0f" />
<meta name="color-scheme" content="dark" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<title>Chapters</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://rosho-c2d11-default-rtdb.firebaseio.com" crossorigin />
<link rel="dns-prefetch" href="https://rosho-c2d11-default-rtdb.firebaseio.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="back-link" id="backLink" href="#" aria-label="Back">‹</a>
      <h1 class="title" id="pageTitle">Chapters</h1>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <a id="crumbClass" href="#">…</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>
  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><div>Loading chapters…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var readData = APP.readData;
  var getChapterSummaries = APP.getChapterSummaries;
  var setUpdating = APP.setUpdating;

  var classId = getParam('classId');
  var subjectId = getParam('subjectId');

  var $title = document.getElementById('pageTitle');
  var $backLink = document.getElementById('backLink');
  var $crumbClass = document.getElementById('crumbClass');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');

  if (!classId || !subjectId) {
    $content.innerHTML = '<div class="error-banner">Missing class or subject.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }
  $backLink.href = buildUrl('subjects.html', { classId: classId });
  $crumbClass.href = buildUrl('subjects.html', { classId: classId });

  function render(className, subjectName, chapters) {
    $title.textContent = subjectName;
    document.title = subjectName + ' — Chapters';
    $crumbClass.textContent = className;
    $crumbCurrent.textContent = subjectName;

    if (!chapters.length) {
      $content.innerHTML = '<div class="empty">No chapters available.</div>';
      return;
    }

    $content.innerHTML = '<div class="list">' + chapters.map(function (ch) {
      var qcount = ch.qcount || 0;
      var countText = qcount === 0 ? '—' :
        (qcount === 1 ? '1 question' : qcount + ' questions');
      return '<a class="list-item" href="' + buildUrl('questions.html', { classId: classId, subjectId: subjectId, chapterId: ch.id }) + '">' +
             '<span>' + escapeHtml(ch.name || ch.id) + '</span>' +
             '<span class="count">' + countText + '</span>' +
             '<span class="arrow">›</span></a>';
    }).join('') + '</div>';
  }

  function loadChapters() {
    if (!navigator.onLine) {
      $content.innerHTML = '<div class="error-banner">You are offline. Please connect to the internet and reload.<br>' +
                           '<a href="index.html">Go back to Classes</a></div>';
      return;
    }

    setUpdating(true);
    Promise.all([
      readData('/classes/' + classId + '/name'),
      readData('/classes/' + classId + '/subjects/' + subjectId + '/name'),
      getChapterSummaries('/classes/' + classId + '/subjects/' + subjectId + '/chapters')
    ]).then(function (parts) {
      setUpdating(false);
      var className = parts[0];
      var subjectName = parts[1];
      var chapters = parts[2] || [];
      if (className == null || subjectName == null) {
        $content.innerHTML = '<div class="error-banner">This class or subject does not exist.<br>' +
                             '<a href="index.html">Go back to Classes</a></div>';
        return;
      }
      render(String(className), String(subjectName), chapters);
    }).catch(function (err) {
      setUpdating(false);
      $content.innerHTML = '<div class="error-banner">Failed to load chapters: ' +
                           escapeHtml(err.message || 'Unknown error') +
                           '<br><a href="index.html">Go back</a></div>';
    });
  }

  loadChapters();
})();
</script>
</body>
</html>
