<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f6f7fb" />
<meta name="color-scheme" content="light" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<meta name="description" content="" />
<link rel="canonical" href="" />
<title>Questions</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://rosho-c2d11-default-rtdb.firebaseio.com" crossorigin />
<link rel="dns-prefetch" href="https://rosho-c2d11-default-rtdb.firebaseio.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="home-link" href="index.html" aria-label="Home">⌂</a>
      <img src="icon.svg" alt="Q&A" class="site-logo" />
      <h1 class="title" id="pageTitle">Questions</h1>
      <a class="header-action" href="books.html">Books</a>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <a id="crumbClass" href="#">…</a>
      <span class="crumb-sep">›</span>
      <a id="crumbSubject" href="#">…</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search questions…" />
  </div>

  <div id="content">
    <div class="skeleton-list"><div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item short"></div></div>
  </div>
</div>
<footer class="site-footer"><strong>Q&A Student</strong><br>Simple, organized learning for students.</footer>

<a class="bottom-back-btn" id="bottomBackBtn" href="#" aria-label="Back"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M14.8 5.2 8 12l6.8 6.8"/></svg></a>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var readData = APP.readData;
  var svgIcon = APP.svgIcon;
  var setUpdating = APP.setUpdating;
  var setPageMeta = APP.setPageMeta;
  var resolveClassSlug = APP.resolveClassSlug;
  var resolveSubjectSlug = APP.resolveSubjectSlug;
  var resolveChapterSlug = APP.resolveChapterSlug;
  var loadClassById = APP.loadClassById;
  var loadSubjectById = APP.loadSubjectById;
  var loadChapterById = APP.loadChapterById;

  var classSlug = getParam('class');
  var classId = getParam('classId');
  var subjectSlug = getParam('subject');
  var subjectId = getParam('subjectId');
  var chapterSlug = getParam('chapter');
  var chapterId = getParam('chapterId');

  var $title = document.getElementById('pageTitle');
  var $bottomBack = document.getElementById('bottomBackBtn');
  var $crumbClass = document.getElementById('crumbClass');
  var $crumbSubject = document.getElementById('crumbSubject');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');
  var $search = document.getElementById('searchInput');

  if (!classSlug && !classId) {
    $content.innerHTML = '<div class="error-banner">Missing class.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }
  if (!subjectSlug && !subjectId) {
    $content.innerHTML = '<div class="error-banner">Missing subject.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }
  if (!chapterSlug && !chapterId) {
    $content.innerHTML = '<div class="error-banner">Missing chapter.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }

  function resolveClassInfo() {
    if (classSlug) {
      return resolveClassSlug(classSlug).then(function (res) {
        if (res) return res;
        if (classId) return loadClassById(classId);
        return null;
      });
    }
    if (classId) return loadClassById(classId);
    return Promise.resolve(null);
  }

  function resolveSubjectInfo(classInfo) {
    if (subjectSlug) {
      return resolveSubjectSlug(classInfo.id, subjectSlug).then(function (res) {
        if (res) return res;
        if (subjectId) return loadSubjectById(classInfo.id, subjectId);
        return null;
      });
    }
    if (subjectId) return loadSubjectById(classInfo.id, subjectId);
    return Promise.resolve(null);
  }

  function resolveChapterInfo(classInfo, subjectInfo) {
    if (chapterSlug) {
      return resolveChapterSlug(classInfo.id, subjectInfo.id, chapterSlug).then(function (res) {
        if (res) return res;
        if (chapterId) return loadChapterById(classInfo.id, subjectInfo.id, chapterId);
        return null;
      });
    }
    if (chapterId) return loadChapterById(classInfo.id, subjectInfo.id, chapterId);
    return Promise.resolve(null);
  }

  var groups = [];
  var resolvedClass = null;
  var resolvedSubject = null;
  var resolvedChapter = null;

  function buildGroups(rawQuestions) {
    var items = Object.keys(rawQuestions || {}).map(function (id) {
      return {
        id: id,
        type: String((rawQuestions[id] && rawQuestions[id].type) || 'General').trim(),
        question: (rawQuestions[id] && rawQuestions[id].question) || '',
        answer: (rawQuestions[id] && rawQuestions[id].answer) || ''
      };
    });
    var order = [], map = {};
    items.forEach(function (it) {
      if (!map[it.type]) { map[it.type] = []; order.push(it.type); }
      map[it.type].push(it);
    });
    return order.map(function (t) { return { type: t, items: map[t] }; });
  }

  function render() {
    var filter = ($search.value || '').trim().toLowerCase();
    if (!groups.length) {
      $content.innerHTML = '<div class="empty">No questions in this chapter yet.</div>';
      return;
    }
    var total = groups.reduce(function (sum, g) { return sum + g.items.length; }, 0);
    var html = '<div class="page-meta">' + total + ' question' + (total === 1 ? '' : 's') + '</div>';
    var anyShown = false;
    groups.forEach(function (g) {
      var filtered = filter
        ? g.items.filter(function (it) {
            return (it.question || '').toLowerCase().includes(filter) ||
                   (it.type || '').toLowerCase().includes(filter);
          })
        : g.items;
      if (!filtered.length) return;
      anyShown = true;
      html += '<div class="group"><div class="group-title">' + escapeHtml(g.type) + '</div><div class="group-list">';
      filtered.forEach(function (it, idx) {
        var url = buildUrl('answer.html', {
          class: resolvedClass.slug,
          subject: resolvedSubject.slug,
          chapter: resolvedChapter.slug,
          qId: it.id
        });
        html += '<a class="question-item" href="' + url + '">' +
                svgIcon('question') +
                '<span class="card-main"><span class="card-title">' + escapeHtml(it.question) + '</span></span>' +
                '<span class="arrow">›</span></a>';
      });
      html += '</div></div>';
    });
    if (!anyShown) {
      $content.innerHTML = '<div class="empty">No questions match your search.</div>';
      return;
    }
    $content.innerHTML = html;
  }

  function loadQuestions() {
    if (!navigator.onLine) {
      $content.innerHTML = '<div class="error-banner">You are offline. Please connect to the internet and reload.<br>' +
                           '<a href="index.html">Go back to Classes</a></div>';
      return;
    }

    setUpdating(true);
    resolveClassInfo().then(function (classInfo) {
      if (!classInfo) throw new Error('Class not found');
      return resolveSubjectInfo(classInfo).then(function (subjectInfo) {
        if (!subjectInfo) throw new Error('Subject not found');
        return resolveChapterInfo(classInfo, subjectInfo).then(function (chapterInfo) {
          if (!chapterInfo) throw new Error('Chapter not found');
          resolvedClass = classInfo;
          resolvedSubject = subjectInfo;
          resolvedChapter = chapterInfo;
          return readData('/classes/' + classInfo.id + '/subjects/' + subjectInfo.id + '/chapters/' + chapterInfo.id + '/questions');
        });
      });
    }).then(function (rawQuestions) {
      setUpdating(false);
      if (rawQuestions === null) {
        $content.innerHTML = '<div class="error-banner">This chapter does not exist or has no questions.<br>' +
                             '<a href="index.html">Go back to Classes</a></div>';
        return;
      }
      $title.textContent = resolvedChapter.name;
      setPageMeta({
        title: resolvedChapter.name + ' — Questions | ' + resolvedSubject.name + ' | ' + resolvedClass.name,
        description: 'Practice questions for ' + resolvedChapter.name + ' in ' + resolvedSubject.name + ', ' + resolvedClass.name + '.',
        canonical: window.location.href
      });
      $crumbClass.href = buildUrl('subjects.html', { class: resolvedClass.slug });
      $crumbClass.textContent = resolvedClass.name;
      $crumbSubject.href = buildUrl('chapters.html', { class: resolvedClass.slug, subject: resolvedSubject.slug });
      $crumbSubject.textContent = resolvedSubject.name;
      $crumbCurrent.textContent = resolvedChapter.name;
      $bottomBack.href = buildUrl('chapters.html', { class: resolvedClass.slug, subject: resolvedSubject.slug });
      groups = buildGroups(rawQuestions);
      render();
    }).catch(function (err) {
      setUpdating(false);
      $content.innerHTML = '<div class="error-banner">Failed to load questions: ' +
                           escapeHtml(err.message || 'Unknown error') +
                           '<br><a href="index.html">Go back</a></div>';
    });
  }

  $search.addEventListener('input', render);
  loadQuestions();
})();
</script>
</body>
</html>
