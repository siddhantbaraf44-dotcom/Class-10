<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f6f7fb" />
<meta name="color-scheme" content="light" />
<meta name="HandheldFriendly" content="true" />
<meta name="format-detection" content="telephone=no" />
<meta name="msapplication-tap-highlight" content="no" />
<meta name="description" content="" />
<link rel="canonical" href="" />
<title>Chapters</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a3299'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-size='62' font-family='sans-serif' font-weight='700'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://rosho-c2d11-default-rtdb.firebaseio.com" crossorigin />
<link rel="dns-prefetch" href="https://rosho-c2d11-default-rtdb.firebaseio.com" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="offline-tag" id="offlineTag">OFFLINE</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <a class="home-link" href="index.html" aria-label="Home">⌂</a>
      <img src="icon.svg" alt="Q&A" class="site-logo" />
      <h1 class="title" id="pageTitle">Chapters</h1>
      <a class="header-action" href="books.html">Books</a>
      <div class="update-pill" id="updatePill">Updating…</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Classes</a>
      <span class="crumb-sep">›</span>
      <a id="crumbClass" href="#">…</a>
      <span class="crumb-sep">›</span>
      <span class="current">…</span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search chapters…" />
  </div>

  <div id="content">
    <div class="skeleton-list"><div class="skeleton-item"></div><div class="skeleton-item"></div><div class="skeleton-item"></div></div>
  </div>
</div>
<footer class="site-footer"><strong>Q&A Student</strong><br>Simple, organized learning for students.</footer>

<a class="bottom-back-btn" id="bottomBackBtn" href="#" aria-label="Back"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M14.8 5.2 8 12l6.8 6.8"/></svg></a>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
(function () {
  var APP = window.APP;
  var escapeHtml = APP.escapeHtml;
  var getParam = APP.getParam;
  var buildUrl = APP.buildUrl;
  var readData = APP.readData;
  var getChapterSummaries = APP.getChapterSummaries;
  var svgIcon = APP.svgIcon;
  var setUpdating = APP.setUpdating;
  var setPageMeta = APP.setPageMeta;
  var resolveClassSlug = APP.resolveClassSlug;
  var resolveSubjectSlug = APP.resolveSubjectSlug;
  var loadClassById = APP.loadClassById;
  var loadSubjectById = APP.loadSubjectById;

  var classSlug = getParam('class');
  var classId = getParam('classId');
  var subjectSlug = getParam('subject');
  var subjectId = getParam('subjectId');

  var $title = document.getElementById('pageTitle');
  var $bottomBack = document.getElementById('bottomBackBtn');
  var $crumbClass = document.getElementById('crumbClass');
  var $crumbCurrent = document.querySelector('#breadcrumb .current');
  var $content = document.getElementById('content');
  var $search = document.getElementById('searchInput');
  var allChapters = [];
  var resolvedClass = null;
  var resolvedSubject = null;

  if (!classSlug && !classId) {
    $content.innerHTML = '<div class="error-banner">Missing class.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }
  if (!subjectSlug && !subjectId) {
    $content.innerHTML = '<div class="error-banner">Missing subject.<br>' +
                         '<a href="index.html">Go back to Classes</a></div>';
    return;
  }

  function resolveClassInfo() {
    if (classSlug) {
      return resolveClassSlug(classSlug).then(function (res) {
        if (res) return res;
        if (classId) return loadClassById(classId);
        return null;
      });
    }
    if (classId) return loadClassById(classId);
    return Promise.resolve(null);
  }

  function resolveSubjectInfo(classInfo) {
    if (subjectSlug) {
      return resolveSubjectSlug(classInfo.id, subjectSlug).then(function (res) {
        if (res) return res;
        if (subjectId) return loadSubjectById(classInfo.id, subjectId);
        return null;
      });
    }
    if (subjectId) return loadSubjectById(classInfo.id, subjectId);
    return Promise.resolve(null);
  }

  function render(classInfo, subjectInfo, chapters) {
    resolvedClass = classInfo;
    resolvedSubject = subjectInfo;
    allChapters = chapters || [];
    $title.textContent = subjectInfo.name;
    setPageMeta({
      title: subjectInfo.name + ' ' + classInfo.name + ' - Exercise Questions and Answers | QClasses',
      description: 'Exercise questions and answers of ' + subjectInfo.name + ' ' + classInfo.name + ' SSC Maharashtra Board. Browse all chapters on QClasses.',
      canonical: window.location.href
    });
    $crumbClass.href = buildUrl('subjects.html', { class: classInfo.slug });
    $crumbClass.textContent = classInfo.name;
    $crumbCurrent.textContent = subjectInfo.name;
    renderFiltered();
  }

  function renderFiltered() {
    var filter = ($search.value || '').trim().toLowerCase();
    var chapters = filter ? allChapters.filter(function (ch) {
      return String(ch.name || ch.id).toLowerCase().includes(filter);
    }) : allChapters;

    if (!allChapters.length) {
      $content.innerHTML = '<div class="empty">No chapters available.</div>';
      return;
    }
    if (!chapters.length) {
      $content.innerHTML = '<div class="empty">No chapters match your search.</div>';
      return;
    }

    $content.innerHTML = '<div class="page-meta">' + allChapters.length + ' chapter' + (allChapters.length === 1 ? '' : 's') + '</div>' +
      '<div class="list">' + chapters.map(function (ch) {
        var qcount = ch.qcount || 0;
        var countText = qcount === 0 ? '—' :
          (qcount === 1 ? '1 question' : qcount + ' questions');
        return '<a class="list-item" href="' + buildUrl('questions.html', { class: resolvedClass.slug, subject: resolvedSubject.slug, chapter: ch.slug }) + '">' +
               svgIcon('chapter') +
               '<span class="card-main"><span class="card-title">' + escapeHtml(ch.name || ch.id) + '</span>' +
               '<span class="card-subtitle">' + escapeHtml(resolvedSubject.name) + '</span></span>' +
               '<span class="count">' + countText + '</span>' +
               '<span class="arrow">›</span></a>';
      }).join('') + '</div>';
  }

  function loadChapters() {
    if (!navigator.onLine) {
      $content.innerHTML = '<div class="error-banner">You are offline. Please connect to the internet and reload.<br>' +
                           '<a href="index.html">Go back to Classes</a></div>';
      return;
    }

    setUpdating(true);
    resolveClassInfo().then(function (classInfo) {
      if (!classInfo) throw new Error('Class not found');
      return resolveSubjectInfo(classInfo).then(function (subjectInfo) {
        if (!subjectInfo) throw new Error('Subject not found');
        return getChapterSummaries('/classes/' + classInfo.id + '/subjects/' + subjectInfo.id + '/chapters').then(function (chapters) {
          setUpdating(false);
          $bottomBack.href = buildUrl('subjects.html', { class: classInfo.slug });
          render(classInfo, subjectInfo, chapters);
        });
      });
    }).catch(function (err) {
      setUpdating(false);
      $content.innerHTML = '<div class="error-banner">Failed to load chapters: ' +
                           escapeHtml(err.message || 'Unknown error') +
                           '<br><a href="index.html">Go back</a></div>';
    });
  }

  $search.addEventListener('input', renderFiltered);
  loadChapters();
})();
</script>
</body>
</html>
